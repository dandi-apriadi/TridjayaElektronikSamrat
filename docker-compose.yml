services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: sqlite:///app/tridjaya.db
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173
      RUST_LOG: info
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis}@redis:6379
    ports:
      - "8081:8081"
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8081
    ports:
      - "5173:80"
    depends_on:
      - backend
      - redis

  redis:
    image: redis:alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me-redis}"]
    volumes:
      - redis_data:/data

volumes:
  backend_data:
  redis_data:
